<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cumpleaños Estefano 🦖</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
/* Reset y Base Responsiva */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body { 
    min-height: 100vh; 
    min-height: -webkit-fill-available;
    font-family: 'Nunito', sans-serif; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    overflow-x: hidden; 
    position: relative; 
    background: #2d6b35; 
    padding: 10px; /* Espacio para que la tarjeta no pegue a los bordes en móviles pequeños */
}

html { height: -webkit-fill-available; }

.ext-bg { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse at 25% 75%,#1e5228 0%,transparent 50%),radial-gradient(ellipse at 75% 25%,#3a7d44 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,#2a6332 0%,transparent 70%),#2d6b35; }

/* Decoraciones de fondo adaptables */
.bg-dino { position:fixed; font-size:clamp(80px, 20vw, 200px); opacity:0.15; z-index:1; pointer-events:none; user-select:none; animation:bgFloat var(--d) ease-in-out infinite alternate; }
@keyframes bgFloat { from{transform:translateY(0) rotate(var(--ra))} to{transform:translateY(-14px) rotate(var(--rb))} }

.card { 
    position: relative; 
    z-index: 2; 
    width: 100%; 
    max-width: 420px; 
    border-radius: 24px; 
    overflow: hidden; 
    box-shadow: 0 15px 50px rgba(0,0,0,0.5); 
    animation: cardIn 1s ease both; 
    border: 2px solid rgba(100,200,80,0.4); 
    background: #122d1a;
}

@keyframes cardIn { from{opacity:0;transform:scale(0.95) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

.header { position:relative; padding: clamp(15px, 5vw, 25px); text-align:center; overflow:hidden; background:#0d3320; }
.jp-logo { font-family:'Bebas Neue',cursive; font-size: 11px; letter-spacing:4px; color:#ffe000; opacity:0.9; margin-bottom:8px; }

.gate-title { font-family:'Bebas Neue',cursive; font-size: clamp(40px, 12vw, 58px); color:#ffe000; text-shadow:0 0 20px rgba(255,220,0,0.4), 2px 2px 0 #7a5c00; line-height:0.95; }
.gate-subtitle { font-family:'Bebas Neue',cursive; font-size: clamp(20px, 6vw, 26px); color:#5cdb5c; letter-spacing:2px; margin-bottom:15px; }

.photo-wrap { 
    margin: 0 auto; 
    width: clamp(130px, 40vw, 175px); 
    height: clamp(130px, 40vw, 175px); 
    border-radius: 50%; 
    border: 4px solid #ffe000; 
    box-shadow: 0 0 25px rgba(255,220,0,0.3); 
    overflow: hidden; 
    background: #0d2405; 
}
.photo-wrap img { width:100%; height:100%; object-fit:cover; }

.body { padding: clamp(15px, 5vw, 25px); text-align:center; background:#122d1a; }

.invite-big { font-family:'Bebas Neue',cursive; font-size: clamp(22px, 7vw, 28px); color:#5cdb5c; letter-spacing:2px; margin-bottom:15px; }

/* Grid de información responsivo */
.info-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.info-box { background:rgba(255,255,255,0.06); border:1px solid rgba(92,219,92,0.3); border-radius:16px; padding: 12px 5px; }
.ib-label { font-size: 9px; font-weight:800; color:#5cdb5c; text-transform:uppercase; margin-bottom:4px; }
.ib-val { font-size: clamp(12px, 4vw, 14px); font-weight:800; color:#eee; line-height:1.2; }

.loc-box { 
    display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.06); 
    border:1px solid rgba(92,219,92,0.3); border-radius:16px; padding: 12px; 
    margin-bottom:15px; text-decoration:none; transition: 0.3s;
}
.loc-box:active { transform: scale(0.98); background:rgba(92,219,92,0.1); }

.loc-content { flex:1; text-align:left; }
.loc-val { font-size: 12px; font-weight:700; color:#ccc; line-height:1.4; }
.loc-maps { font-size: 10px; color:#5cdb5c; font-weight:800; margin-top:4px; }

.wsp-btn { 
    display:flex; align-items:center; justify-content:center; gap:10px; 
    background:linear-gradient(135deg,#25d366,#128c7e); color:#fff; 
    font-weight:900; font-size: 16px; padding: 16px; border-radius:100px; 
    text-decoration:none; box-shadow:0 6px 20px rgba(37,211,102,0.3); 
    transition: 0.3s;
}
.wsp-btn:active { transform: scale(0.96); }

.closing { font-family:'Bebas Neue',cursive; font-size: 24px; color:#ffe000; margin-top: 15px; }
.footprints { font-size: 20px; margin-top: 8px; opacity: 0.7; }
</style>
</head>
<body>
<div class="ext-bg"></div>
<div class="bg-dino" style="--fs:160px;--d:7s;--ra:-6deg;--rb:4deg;top:5%;left:-5%">🦖</div>
<div class="bg-dino" style="--fs:180px;--d:9s;--ra:4deg;--rb:-4deg;bottom:5%;right:-5%">🦕</div>

<div class="card">
  <div class="header">
    <div class="ct">
      <div class="jp-logo">⚡ JURASSIC PARK ⚡</div>
      <div class="gate-title">ESTEFANO</div>
      <div class="gate-subtitle">¡Cumple 8 años!</div>
      <div class="photo-wrap">
        <img src="data:image/png;base64,..." alt="Estefano"> </div>
    </div>
  </div>

  <div class="body">
    <p class="invite-msg" style="color:rgba(255,255,255,0.6); font-size: 13px; font-weight: 700; margin-bottom: 5px;">¡Estás invitado a la aventura de!</p>
    <p class="invite-big">🦖 MI CUMPLEAÑOS 🦕</p>
    
    <div class="info-grid">
      <div class="info-box">
        <div class="ib-label">📅 Fecha</div>
        <div class="ib-val">Sábado<br>4 de Abril</div>
      </div>
      <div class="info-box">
        <div class="ib-label">⏰ Hora</div>
        <div class="ib-val">6:00 PM</div>
      </div>
    </div>

    <a id="btn-mapa" class="loc-box" href="https://maps.app.goo.gl/uX3LhPZJ6oZ6C9S2A" target="_blank">
      <span style="font-size: 24px;">📍</span>
      <div class="loc-content">
        <div class="ib-label">Ubicación</div>
        <div class="loc-val">Asoc. Inmaculada Concepción<br>Mz. A, Lt. 05</div>
        <div class="loc-maps">PULSA PARA VER EL MAPA →</div>
      </div>
    </a>

    <a id="btn-wsp" class="wsp-btn" href="https://wa.me/qr/UJTTZT7FO72ZG1" target="_blank">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-1.557-.594-2.652-1.562-1.155-1.026-1.919-2.112-2.144-2.499-.225-.387-.018-.597.174-.789.176-.176.387-.45.582-.675.193-.225.258-.388.387-.648.129-.261.065-.485-.033-.675-.096-.191-.774-1.868-1.065-2.565-.282-.678-.574-.585-.788-.596-.204-.01-.437-.012-.67-.012-.233 0-.612.088-.932.437-.321.35-1.225 1.198-1.225 2.921 0 1.722 1.253 3.39 1.427 3.624.174.233 2.466 3.766 5.972 5.282.834.36 1.485.575 1.992.735.836.266 1.598.228 2.2.138.672-.101 2.072-.848 2.362-1.67.29-.823.29-1.528.203-1.67-.087-.142-.321-.228-.609-.371z"/></svg>
      Confirmar por WhatsApp
    </a>

    <div class="closing">¡TE ESPERAMOS!</div>
    <div class="footprints">🐾 🦖 🐾</div>
  </div>
</div>

<script>
  // Carga el archivo mp3 que subas a GitHub con el nombre musica.mp3
  const audio = new Audio('musica.mp3'); 
  audio.loop = true;
  audio.volume = 0.5;

  // Función para pausar música
  const detenerMusica = () => {
    audio.pause();
  };

  const iniciarMusica = () => {
    audio.play().catch(err => console.log("Esperando interacción..."));
    // Quitamos eventos de inicio una vez que suena
    ["click", "touchstart", "scroll"].forEach(e => document.removeEventListener(e, iniciarMusica));
  };

  // Activar música con la primera interacción
  document.addEventListener('click', iniciarMusica);
  document.addEventListener('touchstart', iniciarMusica);
  window.addEventListener('scroll', iniciarMusica, { once: true });

  // Detener música al salir a WSP o MAPA
  document.getElementById('btn-wsp').addEventListener('click', detenerMusica);
  document.getElementById('btn-mapa').addEventListener('click', detenerMusica);
</script>
</body>
</html>
